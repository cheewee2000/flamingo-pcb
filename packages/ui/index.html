<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flamingo</title>
  </head>
  <body>
    <div id="app">
      <header id="header" class="header">
        <span class="wordmark">CW&amp;T</span>
        <span class="header-app">Flamingo</span>
        <span id="project-name" class="project-name"></span>
        <span class="header-spacer"></span>
        <div id="search-box" class="search-box">
          <input id="search-input" class="search-input" type="text" placeholder="search parts / nets  ( / )" autocomplete="off" spellcheck="false" />
          <div id="search-results" class="search-results" hidden></div>
        </div>
        <button id="open-btn" class="header-action" type="button">Open</button>
        <button id="save-btn" class="header-action" type="button">Save</button>
      </header>

      <div id="toolbar-left" class="panel toolbar-left">
        <div class="panel-title">
          Tools
          <span
            id="tool-help"
            class="tool-help"
            title="S select · O outline · K keepout · Z zone · H hole · T silk · X ripup · M measure · D dimension&#10;Esc = select · Del/Backspace = remove · R = rotate · F = flip side · Ctrl/Cmd = bypass snap"
            >?</span
          >
        </div>
        <div id="tool-buttons" class="tool-buttons"></div>
        <div id="tool-options" class="tool-options"></div>
        <div class="panel-section">
          <label class="snap-toggle"><input type="checkbox" id="snap-toggle" checked /> Snap 0.5mm</label>
        </div>
        <div class="panel-section edit-buttons">
          <button id="undo-btn" class="edit-btn" type="button">Undo</button>
          <button id="redo-btn" class="edit-btn" type="button">Redo</button>
        </div>
        <div class="panel-section route-section">
          <button id="route-btn" class="route-btn" type="button">Lock &amp; Route</button>
          <div id="route-status" class="route-status"></div>
          <button id="ripall-btn" class="ripall-btn" type="button">Rip up all</button>
          <button id="exportfab-btn" class="exportfab-btn" type="button">Export fab</button>
          <div id="exportfab-status" class="route-status"></div>
        </div>
        <div class="panel-section bom-section">
          <div class="panel-title">BOM</div>
          <div id="bom-list" class="bom-list"></div>
        </div>
      </div>

      <div id="viewport" class="viewport">
        <div id="view-tabs" class="view-tabs">
          <button id="view-tab-2d" class="view-tab active" type="button" data-view="2d">2D</button>
          <button id="view-tab-3d" class="view-tab" type="button" data-view="3d">3D</button>
        </div>
        <canvas id="board-canvas"></canvas>
        <canvas id="viewer3d-canvas" class="viewer3d-canvas" hidden></canvas>
        <div id="viewer3d-hud" class="viewer3d-hud" hidden>
          <label><input type="checkbox" id="v3d-components" checked /> components</label>
          <label><input type="checkbox" id="v3d-silk" checked /> silk</label>
          <span class="viewer3d-hint">drag orbit · wheel zoom · shift-drag pan</span>
        </div>
        <div id="side-badge" class="side-badge" hidden>BOTTOM</div>
      </div>

      <div id="panel-right" class="panel panel-right">
        <div class="panel-section">
          <div class="panel-title">Selection</div>
          <div id="props-panel" class="props-panel"></div>
        </div>
        <div class="panel-section">
          <div class="panel-title">Layers</div>
          <div id="layer-list" class="layer-list"></div>
        </div>
        <div class="panel-section">
          <div class="panel-title">Nets</div>
          <div id="net-list" class="net-list"></div>
        </div>
        <div class="panel-section">
          <div class="panel-title">Board</div>
          <div id="board-info" class="board-info"></div>
        </div>
      </div>

      <div id="status-bar" class="status-bar">
        <span id="status-cursor">x: -- y: --</span>
        <span id="status-zoom">zoom: --</span>
        <span id="status-hover">&nbsp;</span>
        <span id="status-measure"></span>
        <span id="status-conn" class="status-conn">connecting…</span>
        <span id="status-version" class="status-version">Flamingo</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
